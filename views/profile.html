{{define "title"}} Profile {{end}}

{{define "content"}}
<main class="flex flex-col">
    {{template "backnav" .}}
    <div class="p-4 flex flex-col grow max-w-2xl sm:mx-auto sm:min-w-xl">
        <div class="mx-auto grow flex items-center">
            <div class="avatar">
                <div class="w-40 rounded-full">
                    <img src="/uploads/pfp/{{.Pfp}}" alt="">
                    <input 
                        type="file"
                        class="hidden"
                        accept="image/png, image/jpeg"
                    />
                    <button
                        class="absolute w-full h-full top-0 bg-black/60 opacity-0 hover:opacity-50 active:opacity-100 rounded-full"
                    >
                        <svg class="size-8 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="flex flex-col justify-center grow">
            <div class="flex bg-base-200 p-4 border border-neutral first:rounded-t-lg last:rounded-b-lg">
                <p class="flex-1 text-base-content/80">NIM</p>
                <p class="font-semibold">{{.Nim}}</p>
            </div>
            <div class="flex bg-base-200 p-4 border border-neutral first:rounded-t-lg last:rounded-b-lg">
                <p class="flex-1 text-base-content/80">Nama</p>
                <p class="font-semibold">{{.Nama}}</p>
            </div>
            <div class="flex bg-base-200 p-4 border border-neutral first:rounded-t-lg last:rounded-b-lg">
                <p class="flex-1 text-base-content/80">Tempat</p>
                <p class="font-semibold">{{.TempatLahir}}</p>
            </div>
            <div class="flex bg-base-200 p-4 border border-neutral first:rounded-t-lg last:rounded-b-lg">
                <p class="flex-1 text-base-content/80">Tanggal Lahir:</p>
                <p class="font-semibold tgl-lahir">{{.TanggalLahir}}</p>
            </div>
        </div>
        <a href="/logout" class="btn text-error btn-ghost w-fit ml-auto mt-4">Logout</a>
    </div>
</main>
{{end}}
